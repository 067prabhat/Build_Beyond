name: Regenerate Graph Diagram

on:
  push:
    branches: [main]
    paths:
      - "app/agent.py"
      - "app/core/**"
      - "app/tools/render_graph.py"
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render LangGraph diagram
        working-directory: .
        run: python -m app.tools.render_graph

      - name: Commit updated diagram
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-regenerate LangGraph workflow diagram"
          file_pattern: |
            docs/workflow.md
            docs/langgraph_diagram.png