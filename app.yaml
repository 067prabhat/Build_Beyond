apiVersion: workload.appfnd.sap/v1
kind: Agent
metadata:
  name: tender-synopsis-agent
  namespace: tender-synopsis-agent
spec:
  container:
    buildPath: .
    port: 9000
  resources:
    requests:
      memory: "256Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "100m"
  models:
    - executableId: aws-bedrock
      name: anthropic--claude-4.5-sonnet
      version: latest
  requires:
    - name: pps-destination
      service: destination
      plan: lite
    # v3.0 - SAP Agent Memory (E8)
    # Provides:
    #   - LangGraph checkpointer (replaces in-memory _state singleton)
    #   - Semantic memories for approved synopses (few-shot learning)
    #   - Messages for HITL feedback aggregation (drift detection)
    - name: hana-agent-memory
      service: hana-agent-memory
      plan: standard