<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tender Synopsis Agent — Test UI</title>
  <style>
    :root {
      --sap-shell:   #1B2A4A;
      --sap-brand:   #0070F2;
      --sap-bg:      #F5F6F7;
      --sap-white:   #FFFFFF;
      --sap-border:  #D9DBDD;
      --sap-text:    #32363A;
      --sap-muted:   #6A6D70;
      --sap-green:   #107E3E;
      --sap-orange:  #E9730C;
      --sap-red:     #BB0000;
      --radius:      8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "72", Arial, sans-serif;
      background: var(--sap-bg);
      color: var(--sap-text);
      font-size: 14px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Shell Bar ── */
    .shell {
      background: var(--sap-shell);
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
    }
    .shell-logo {
      font-size: 18px;
      font-weight: 900;
      color: white;
      background: var(--sap-brand);
      padding: 3px 8px;
      border-radius: 3px;
      letter-spacing: 1px;
    }
    .shell-title { color: white; font-size: 15px; font-weight: 600; flex: 1; }
    .shell-badge {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }
    .status-dot.online { background: #4CAF50; }

    /* ── Main layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left Panel: Controls ── */
    .controls {
      width: 280px;
      background: var(--sap-white);
      border-right: 1px solid var(--sap-border);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .controls h2 {
      font-size: 12px;
      font-weight: 700;
      color: var(--sap-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--sap-border);
    }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 12px; font-weight: 600; color: var(--sap-muted); }
    .field input, .field select {
      height: 34px;
      border: 1px solid #B0B3B8;
      border-radius: 4px;
      padding: 0 10px;
      font-size: 13px;
      font-family: inherit;
      color: var(--sap-text);
      outline: none;
    }
    .field input:focus, .field select:focus {
      border-color: var(--sap-brand);
      box-shadow: 0 0 0 2px rgba(0,112,242,0.2);
    }
    .btn-generate {
      height: 38px;
      background: var(--sap-brand);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-generate:hover { background: #0057D2; }
    .btn-generate:disabled { opacity: 0.45; cursor: not-allowed; }
    .divider { border: none; border-top: 1px solid var(--sap-border); margin: 4px 0; }

    /* Connection info */
    .conn-info {
      background: #F0F6FF;
      border: 1px solid #B8D8F8;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 11px;
      color: #0D47A1;
    }
    .conn-info span { display: block; margin-bottom: 2px; }

    /* Session info */
    .session-box {
      background: #F8F9FB;
      border: 1px solid var(--sap-border);
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 11px;
      color: var(--sap-muted);
    }
    .session-box .ctx {
      font-family: monospace;
      word-break: break-all;
      color: var(--sap-brand);
      font-size: 10px;
    }
    .btn-clear {
      height: 30px;
      background: none;
      border: 1px solid var(--sap-border);
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      color: var(--sap-red);
      font-family: inherit;
      transition: background 0.12s;
    }
    .btn-clear:hover { background: #FFF0F0; }

    /* ── Right Panel: Chat ── */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: var(--sap-white);
      border-bottom: 1px solid var(--sap-border);
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      color: var(--sap-text);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .chat-header span { color: var(--sap-muted); font-weight: 400; font-size: 12px; }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg { display: flex; gap: 10px; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.agent { align-self: flex-start; }
    .msg.system { align-self: center; max-width: 100%; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      flex-shrink: 0;
    }
    .msg.user .avatar { background: var(--sap-brand); color: white; }
    .msg.agent .avatar { background: var(--sap-shell); color: white; }

    .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--sap-brand);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.agent .bubble {
      background: var(--sap-white);
      border: 1px solid var(--sap-border);
      color: var(--sap-text);
      border-bottom-left-radius: 4px;
    }
    .msg.system .bubble {
      background: #FFF8E1;
      border: 1px solid #FFD54F;
      color: #5D4037;
      font-size: 12px;
      border-radius: 6px;
      text-align: center;
      padding: 6px 14px;
    }
    .msg.error .bubble {
      background: #FFF0F0;
      border: 1px solid #FFCDD2;
      color: var(--sap-red);
    }

    .ts {
      font-size: 10px;
      color: var(--sap-muted);
      margin-top: 3px;
      text-align: right;
    }
    .msg.agent .ts { text-align: left; }

    /* State badge inside bubble */
    .state-badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .state-badge.input-required { background: #FFF3E0; color: var(--sap-orange); border: 1px solid #FFB74D; }
    .state-badge.completed      { background: #E8F5E9; color: var(--sap-green);  border: 1px solid #81C784; }
    .state-badge.working        { background: #E3F2FD; color: #1565C0; border: 1px solid #64B5F6; }

    /* Typing indicator */
    .typing { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
    .typing span {
      width: 7px; height: 7px; background: var(--sap-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-6px); }
    }

    /* Quick reply buttons */
    .quick-replies {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 4px 0 0 42px;
    }
    .qr-btn {
      padding: 5px 14px;
      border-radius: 16px;
      border: 1px solid var(--sap-brand);
      background: white;
      color: var(--sap-brand);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s, color 0.12s;
    }
    .qr-btn:hover { background: var(--sap-brand); color: white; }
    .qr-btn.reject  { border-color: var(--sap-red);    color: var(--sap-red); }
    .qr-btn.reject:hover  { background: var(--sap-red);    color: white; }
    .qr-btn.approve { border-color: var(--sap-green);  color: var(--sap-green); }
    .qr-btn.approve:hover { background: var(--sap-green);  color: white; }

    /* ── Input bar ── */
    .input-bar {
      background: var(--sap-white);
      border-top: 1px solid var(--sap-border);
      padding: 12px 20px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    .input-bar input {
      flex: 1;
      height: 38px;
      border: 1px solid #B0B3B8;
      border-radius: 20px;
      padding: 0 16px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    .input-bar input:focus { border-color: var(--sap-brand); }
    .btn-send {
      width: 38px; height: 38px;
      background: var(--sap-brand);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .btn-send:hover { background: #0057D2; }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-send svg { fill: white; }

    /* ── Synopsis card styles (inside agent bubble) ── */
    .synopsis-card {
      background: var(--sap-white);
      border: 1px solid var(--sap-border);
      border-radius: 10px;
      overflow: hidden;
      min-width: 360px;
      max-width: 600px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .syn-header {
      background: var(--sap-shell);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .syn-header-title {
      color: white;
      font-size: 13px;
      font-weight: 700;
      flex: 1;
    }
    .syn-portal-badge {
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.9);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .syn-summary {
      padding: 10px 14px;
      font-size: 12px;
      color: var(--sap-muted);
      border-bottom: 1px solid #F0F1F2;
      line-height: 1.5;
      font-style: italic;
    }
    .syn-section {
      padding: 8px 14px;
      border-bottom: 1px solid #F0F1F2;
    }
    .syn-section:last-of-type { border-bottom: none; }
    .syn-section-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--sap-brand);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .syn-field {
      display: flex;
      gap: 8px;
      padding: 3px 0;
      font-size: 12px;
      align-items: baseline;
    }
    .syn-field-label {
      color: var(--sap-muted);
      min-width: 140px;
      flex-shrink: 0;
      font-size: 11px;
    }
    .syn-field-value {
      color: var(--sap-text);
      font-weight: 500;
    }
    .syn-field-value.muted { color: var(--sap-muted); font-style: italic; font-weight: 400; }
    .syn-field-value.brand { color: var(--sap-brand); font-weight: 700; }
    .syn-field-value.orange { color: var(--sap-orange); font-weight: 700; }
    .syn-star {
      color: #F0AB00;
      font-size: 10px;
      flex-shrink: 0;
      width: 14px;
    }
    /* Date tiles row */
    .syn-dates {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 6px;
      padding: 8px 14px;
      border-bottom: 1px solid #F0F1F2;
    }
    .syn-date-tile {
      background: #F8F9FB;
      border: 1px solid var(--sap-border);
      border-top: 3px solid var(--sap-brand);
      border-radius: 4px;
      padding: 6px 8px;
    }
    .syn-date-tile.deadline { border-top-color: var(--sap-orange); }
    .syn-date-tile.opening  { border-top-color: var(--sap-green);  }
    .syn-date-label { font-size: 10px; color: var(--sap-muted); margin-bottom: 3px; font-weight: 600; }
    .syn-date-value { font-size: 11px; font-weight: 700; color: var(--sap-text); }
    .syn-date-tile.deadline .syn-date-value { color: var(--sap-orange); }
    /* Action items */
    .syn-actions { padding: 6px 14px 8px; }
    .syn-action-item {
      display: flex;
      gap: 8px;
      padding: 4px 0;
      font-size: 12px;
      color: var(--sap-text);
      align-items: flex-start;
    }
    .syn-action-check {
      width: 18px; height: 18px;
      background: var(--sap-green);
      border-radius: 50%;
      color: white;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    /* Missing fields */
    .syn-missing {
      padding: 6px 14px 8px;
      background: #FFFBF0;
      border-top: 1px solid #F6C400;
    }
    .syn-missing-title {
      font-size: 10px;
      font-weight: 700;
      color: #7A5F00;
      margin-bottom: 5px;
    }
    .syn-missing-tag {
      display: inline-block;
      background: #FFF3CC;
      border: 1px solid #F6C400;
      color: #7A4F00;
      font-size: 10px;
      padding: 1px 7px;
      border-radius: 10px;
      margin: 2px;
    }
    .syn-portal-missing {
      padding: 6px 14px 8px;
      background: #FFF0F0;
      border-top: 1px solid #FFCDD2;
    }
    .syn-portal-missing-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--sap-red);
      margin-bottom: 5px;
    }
    .syn-portal-tag {
      display: inline-block;
      background: #FFE0E0;
      border: 1px solid #FFCDD2;
      color: #8B0000;
      font-size: 10px;
      padding: 1px 7px;
      border-radius: 10px;
      margin: 2px;
    }
    .syn-compliance {
      padding: 6px 14px 8px;
      background: #F0F6FF;
      border-top: 1px solid #B8D8F8;
      font-size: 11px;
      color: #0D47A1;
      line-height: 1.5;
    }

    /* ── Inline edit mode ── */
    .syn-field-input {
      flex: 1;
      border: 1px solid var(--sap-brand);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 12px;
      font-family: inherit;
      color: var(--sap-text);
      background: #F0F6FF;
      outline: none;
      min-width: 0;
    }
    .syn-field-input:focus { box-shadow: 0 0 0 2px rgba(0,112,242,0.2); }
    .edit-mode-banner {
      background: #FFF8E1;
      border-bottom: 1px solid #FFD54F;
      padding: 7px 14px;
      font-size: 11px;
      color: #5D4037;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-save-edits {
      height: 30px;
      padding: 0 14px;
      background: var(--sap-green);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s;
    }
    .btn-save-edits:hover { background: #0A5C2E; }
    .btn-cancel-edit {
      height: 30px;
      padding: 0 12px;
      background: none;
      border: 1px solid var(--sap-border);
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      color: var(--sap-muted);
      font-family: inherit;
    }
    .btn-cancel-edit:hover { background: #F5F5F5; }
    .syn-date-input {
      width: 100%;
      border: 1px solid var(--sap-brand);
      border-radius: 3px;
      padding: 2px 5px;
      font-size: 11px;
      font-family: inherit;
      font-weight: 700;
      color: var(--sap-text);
      background: #F0F6FF;
      outline: none;
      margin-top: 2px;
    }
    /* ── Validation banner ── */
    .val-banner {
      padding: 7px 14px;
      font-size: 11px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      border-bottom: 1px solid;
      line-height: 1.5;
    }
    .val-banner.pass {
      background: #E8F5E9;
      border-color: #A5D6A7;
      color: #1B5E20;
    }
    .val-banner.fail {
      background: #FFF8E1;
      border-color: #FFD54F;
      color: #5D4037;
    }
    .val-score {
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- Shell Bar -->
<div class="shell">
  <div class="shell-logo">SAP</div>
  <div class="shell-title">Tender Synopsis Agent — Test UI</div>
  <div id="statusDot" class="status-dot"></div>
  <div class="shell-badge" id="portBadge">A2A · loading...</div>
</div>

<div class="layout">

  <!-- Left Controls Panel -->
  <div class="controls">
    <h2>Generate Synopsis</h2>

    <div class="field">
      <label>Sourcing Project ID *</label>
      <input id="spId" type="text" placeholder="e.g. 5189" value="5189" />
    </div>

    <div class="field">
      <label>Country / Portal</label>
      <select id="country">
        <option value="AUTO">🌐 Auto-detect</option>
        <option value="IN">🇮🇳 India — eProcure/GeM</option>
        <option value="US">🇺🇸 USA — SAM.gov</option>
        <option value="DE">🇩🇪 Germany — TED/DTVP</option>
        <option value="SA">🇸🇦 Saudi — Etimad</option>
        <option value="AE">🇦🇪 UAE — Tejari</option>
        <option value="GB">🇬🇧 UK — Find a Tender</option>
        <option value="FR">🇫🇷 France — BOAMP</option>
        <option value="AU">🇦🇺 Australia — AusTender</option>
      </select>
    </div>

    <div class="field">
      <label>Language</label>
      <select id="language">
        <option>English</option>
        <option>German</option>
        <option>French</option>
        <option>Spanish</option>
        <option>Arabic</option>
        <option>Hindi</option>
        <option>Chinese Simplified</option>
        <option>Japanese</option>
        <option>Portuguese</option>
      </select>
    </div>

    <button class="btn-generate" id="generateBtn" onclick="generateSynopsis()">
      <svg width="14" height="14" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
        <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
      </svg>
      Generate Synopsis
    </button>

    <hr class="divider" />

    <!-- Connection Info -->
    <div class="conn-info">
      <span>🔌 Agent: <strong id="agentUrl">loading...</strong></span>
      <span>📡 Protocol: A2A JSON-RPC 2.0</span>
    </div>

    <!-- Session Info -->
    <div>
      <label class="field" style="margin-bottom:6px">
        <span style="font-size:12px;font-weight:600;color:var(--sap-muted)">Active Session</span>
      </label>
      <div class="session-box">
        <div style="margin-bottom:4px">Context ID:</div>
        <div class="ctx" id="ctxDisplay">—</div>
      </div>
    </div>

    <button class="btn-clear" onclick="clearChat()">🗑 Clear Chat</button>
  </div>

  <!-- Right Chat Panel -->
  <div class="chat-panel">
    <div class="chat-header">
      💬 Conversation
      <span id="chatStatus">Ready</span>
    </div>

    <div class="messages" id="messages">
      <div class="msg system">
        <div class="bubble">Enter a Sourcing Project ID and click Generate Synopsis to start.</div>
      </div>
    </div>

    <div class="input-bar">
      <input id="msgInput" type="text"
        placeholder="Type: approve / reject / edit &lt;field&gt; &lt;value&gt; or any message..."
        onkeydown="if(event.key==='Enter') sendMessage()" />
      <button class="btn-send" id="sendBtn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24">
          <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
  const AGENT_URL = window.location.origin + '/';
  let contextId   = null;
  let msgCounter  = 0;

  // Set port display dynamically
  const origin = window.location.origin;
  document.getElementById('portBadge').textContent = `A2A · ${window.location.host}`;
  document.getElementById('agentUrl').textContent = window.location.host;

  // ── Check agent health on load ────────────────────────────────────────────
  async function checkHealth() {
    try {
      const r = await fetch('/.well-known/agent-card.json');
      if (r.ok) {
        document.getElementById('statusDot').classList.add('online');
        const card = await r.json();
        document.querySelector('.shell-title').textContent =
          `${card.name} — Test UI`;
      }
    } catch(e) {
      document.getElementById('statusDot').style.background = '#F44336';
    }
  }
  checkHealth();

  // ── Synopsis store — keyed by cardId to avoid inline JSON escaping issues ─
  const _synopsisStore = {};

  // ── A2A message send ──────────────────────────────────────────────────────
  async function a2aPost(text) {
    const msgId = `msg-${++msgCounter}-${Date.now()}`;
    const payload = {
      jsonrpc: '2.0',
      method: 'message/send',
      id: `req-${msgCounter}`,
      params: {
        message: {
          messageId: msgId,
          role: 'user',
          parts: [{ kind: 'text', text }],
          ...(contextId ? { contextId } : {})
        }
      }
    };
    const r = await fetch(AGENT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    return await r.json();
  }

  // ── Generate synopsis (Turn 1) ────────────────────────────────────────────
  async function generateSynopsis() {
    const spId     = document.getElementById('spId').value.trim();
    const country  = document.getElementById('country').value;
    const language = document.getElementById('language').value;

    if (!spId) { alert('Please enter a Sourcing Project ID'); return; }

    contextId = null;
    document.getElementById('ctxDisplay').textContent = '—';

    const countryLabel = document.querySelector(`#country option[value="${country}"]`).textContent;
    const query = `Generate a tender synopsis for sourcing project ${spId} for ${countryLabel} format in ${language}`;

    addMessage('user', query);
    setLoading(true);

    try {
      const resp = await a2aPost(query);
      handleResponse(resp);
    } catch(e) {
      addMessage('error', `Network error: ${e.message}`);
    } finally {
      setLoading(false);
    }
  }

  // ── Send custom message (Turn 2+) ─────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text  = input.value.trim();
    if (!text) return;

    input.value = '';
    addMessage('user', text);
    setLoading(true);

    try {
      const resp = await a2aPost(text);
      handleResponse(resp);
    } catch(e) {
      addMessage('error', `Network error: ${e.message}`);
    } finally {
      setLoading(false);
    }
  }

  // ── Handle A2A response ───────────────────────────────────────────────────
  function handleResponse(resp) {
    if (resp.error) {
      addTextBubble('error', `⚠️ Agent error: ${resp.error.message || JSON.stringify(resp.error)}`);
      return;
    }
    const result = resp.result;
    if (!result) { addTextBubble('error', 'Empty response from agent'); return; }

    if (result.contextId) {
      contextId = result.contextId;
      document.getElementById('ctxDisplay').textContent = contextId;
    }

    const state     = result.status?.state || 'unknown';
    const msgText   = result.status?.message?.parts?.[0]?.text || '';
    const artifacts = result.artifacts || [];

    if (artifacts.length > 0) {
      const text = artifacts[0]?.parts?.[0]?.text || '';
      // Try to parse as approval JSON with download URL
      try {
        const approval = JSON.parse(text);
        if (approval.__approved__) {
          addApprovalBubble(approval);
          contextId = null;
          document.getElementById('ctxDisplay').textContent = '—';
          return;
        }
      } catch(e) { /* not approval JSON */ }
      addCompletedBubble(text);
      contextId = null;
      document.getElementById('ctxDisplay').textContent = '—';
    } else if (state === 'input-required' && msgText) {
      let synopsis = null, valScore = -1, valPassed = true, valIssues = [];
      try {
        const parsed = JSON.parse(msgText);
        if (parsed.__synopsis__) {
          synopsis   = parsed.__synopsis__;
          valScore   = parsed.__validation_score__ ?? -1;
          valPassed  = parsed.__validation_passed__ ?? true;
          valIssues  = parsed.__validation_issues__ ?? [];
        }
      } catch(e) { /* not JSON */ }

      if (synopsis) {
        addSynopsisBubble(synopsis, valScore, valPassed, valIssues);
      } else {
        addRichTextBubble(msgText, true);
      }
    } else if (msgText) {
      addTextBubble('agent', msgText, state);
    }

    document.getElementById('chatStatus').textContent =
      state === 'input-required' ? '⏳ Awaiting review' :
      state === 'completed'      ? '✅ Completed' : 'Ready';
  }

  // ── Synopsis card bubble ──────────────────────────────────────────────────
  function addSynopsisBubble(s, valScore, valPassed, valIssues) {
    const msgs = document.getElementById('messages');
    const isOffline = (s.tenderTitle || '').startsWith('[OFFLINE]');

    // Validation banner
    let validationHtml = '';
    if (valScore >= 0) {
      // Use score as truth — < 70 is amber regardless of passed flag
      const actualPassed = valScore >= 70;
      const cls    = actualPassed ? 'pass' : 'fail';
      const icon   = actualPassed ? '✅' : '⚠️';
      const label  = actualPassed
        ? 'AI Validation Passed'
        : (valPassed ? 'AI Validation — Issues Auto-corrected' : 'AI Validation — Issues Found');
      let issuesHtml = '';
      if (valIssues && valIssues.length) {
        issuesHtml = '<ul style="margin:4px 0 0 16px;padding:0">' +
          valIssues.map(i => `<li>${esc(i)}</li>`).join('') + '</ul>';
      }
      validationHtml = `<div class="val-banner ${cls}">
        <span class="val-score">${icon} ${valScore}/100</span>
        <div><strong>${label}</strong>${issuesHtml}</div>
      </div>`;
    }
    const now  = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

    const CATEGORIES = [
      {key:'overview',    icon:'📌', label:'Tender Overview'},
      {key:'commercial',  icon:'💰', label:'Commercial Details'},
      {key:'dates',       icon:'📅', label:'Key Dates'},
      {key:'eligibility', icon:'✅', label:'Eligibility'},
    ];

    // Build fields by category
    let fieldsHtml = '';
    for (const cat of CATEGORIES) {
      const catFields = s.supplierFields.filter(f => f.category === cat.key);
      if (!catFields.length) continue;

      if (cat.key === 'dates') {
        // Date tiles
        let tilesHtml = '';
        catFields.forEach((f, i) => {
          const tileClass = i === 1 ? 'deadline' : i === 2 ? 'opening' : '';
          const valClass  = f.value.toLowerCase().startsWith('not spec') ? 'muted' : '';
          tilesHtml += `<div class="syn-date-tile ${tileClass}">
            <div class="syn-date-label">${esc(f.label)}</div>
            <div class="syn-date-value ${valClass}">${esc(f.value)}</div>
          </div>`;
        });
        fieldsHtml += `
          <div class="syn-section">
            <div class="syn-section-title">${cat.icon} ${cat.label}</div>
          </div>
          <div class="syn-dates">${tilesHtml}</div>`;
      } else {
        let rowsHtml = '';
        catFields.forEach(f => {
          const isMuted = f.value.toLowerCase().startsWith('not spec');
          const valCls  = isMuted ? 'muted' : (f.category === 'commercial' && f.important ? 'brand' : '');
          rowsHtml += `<div class="syn-field">
            <span class="syn-star">${f.important ? '★' : ''}</span>
            <span class="syn-field-label">${esc(f.label)}</span>
            <span class="syn-field-value ${valCls}">${esc(f.value)}</span>
          </div>`;
        });
        fieldsHtml += `<div class="syn-section">
          <div class="syn-section-title">${cat.icon} ${cat.label}</div>
          ${rowsHtml}
        </div>`;
      }
    }

    // Supplier actions
    let actionsHtml = '';
    if (s.supplierActions.length) {
      const items = s.supplierActions.map(a => {
        // Handle both plain strings and objects {text/value/action: "..."}
        const txt = typeof a === 'string' ? a :
                    (a.text || a.value || a.action || a.content || JSON.stringify(a));
        return `<div class="syn-action-item"><div class="syn-action-check">✓</div><span>${esc(txt)}</span></div>`;
      }).join('');
      actionsHtml = `<div class="syn-section">
        <div class="syn-section-title">🎯 Supplier Actions</div>
      </div><div class="syn-actions">${items}</div>`;
    }

    // Portal compliance
    const compHtml = s.portalComplianceNote
      ? `<div class="syn-compliance">ℹ️ ${esc(s.portalComplianceNote)}</div>` : '';

    // Missing portal fields (red)
    let portalMissingHtml = '';
    if (s.portalMissingFields.length) {
      const tags = s.portalMissingFields.map(m => {
        const label = typeof m === 'object' ? m.label : m.split('—')[0].trim();
        return `<span class="syn-portal-tag">${esc(label)}</span>`;
      }).join('');
      portalMissingHtml = `<div class="syn-portal-missing">
        <div class="syn-portal-missing-title">⊘ Required Portal Fields Not in SAP</div>
        ${tags}
      </div>`;
    }

    // Missing SAP info (amber)
    let missingHtml = '';
    if (s.missingInformation?.length) {
      const tags = s.missingInformation.map(m => `<span class="syn-missing-tag">${esc(m)}</span>`).join('');
      missingHtml = `<div class="syn-missing">
        <div class="syn-missing-title">⚠ Missing Information</div>
        ${tags}
      </div>`;
    }

    const offlineBanner = isOffline ? `
      <div style="background:#FFF3E0;border-bottom:2px solid #FF9800;padding:8px 14px;font-size:11px;color:#E65100;display:flex;align-items:center;gap:6px;">
        ⚠️ <strong>SAP OFFLINE</strong> — EMT 601 is unreachable. Showing placeholder data.
        Please select the correct Country/Portal manually and note this is not live data.
      </div>` : '';

    const cardHtml = `<div class="synopsis-card">
      <div class="syn-header">
        <span class="syn-header-title">📋 ${esc((s.tenderTitle || 'Tender Synopsis').replace('[OFFLINE] ',''))}</span>
        ${s.portalName && s.portalName !== 'OFFLINE' ? `<span class="syn-portal-badge">${esc(s.portalName)}</span>` : ''}
        ${isOffline ? `<span class="syn-portal-badge" style="background:rgba(255,152,0,0.3);border-color:rgba(255,152,0,0.5)">⚠️ OFFLINE</span>` : ''}
      </div>
      ${offlineBanner}
      ${validationHtml}
      ${s.executiveSummary ? `<div class="syn-summary">${esc(s.executiveSummary)}</div>` : ''}
      ${compHtml}
      ${fieldsHtml}
      ${actionsHtml}
      ${portalMissingHtml}
      ${missingHtml}
    </div>`;

    const cardId = `card-${Date.now()}`;
    _synopsisStore[cardId] = s;  // store synopsis by cardId — avoids inline JSON escaping

    const el = document.createElement('div');
    el.className = 'msg agent';
    el.innerHTML = `
      <div class="avatar">AI</div>
      <div style="flex:1;min-width:0">
        <div id="${cardId}">${cardHtml}</div>
        <div class="ts">${now}</div>
      </div>`;
    msgs.appendChild(el);

    // Action toolbar
    const qr = document.createElement('div');
    qr.className = 'quick-replies';
    qr.id = `qr-${cardId}`;
    qr.innerHTML = `
      <button class="qr-btn approve" onclick="quickReply('approve')">✅ Approve</button>
      <button class="qr-btn reject"  onclick="quickReply('reject')">❌ Reject</button>
      <button class="qr-btn"         onclick="enterEditMode('${cardId}')">✏️ Edit Fields</button>`;
    msgs.appendChild(qr);
    msgs.scrollTop = msgs.scrollHeight;
  }

  // ── Inline edit mode ──────────────────────────────────────────────────────
  function enterEditMode(cardId) {
    const s    = _synopsisStore[cardId];
    const card = document.getElementById(cardId);
    const qr   = document.getElementById(`qr-${cardId}`);
    if (!card || !s) return;

    // Replace each field value span with an input
    card.querySelectorAll('.syn-field').forEach(row => {
      const labelEl = row.querySelector('.syn-field-label');
      const valueEl = row.querySelector('.syn-field-value');
      if (!labelEl || !valueEl) return;
      const currentVal = valueEl.textContent.replace('*(not specified)*', '');
      const label = labelEl.textContent.trim();
      valueEl.outerHTML = `<input class="syn-field-input"
        data-label="${label.replace(/"/g,'&quot;')}"
        value="${currentVal.replace(/"/g,'&quot;')}"
        style="flex:1" />`;
    });

    // Replace date tile values with inputs
    card.querySelectorAll('.syn-date-tile').forEach(tile => {
      const labelEl = tile.querySelector('.syn-date-label');
      const valueEl = tile.querySelector('.syn-date-value');
      if (!labelEl || !valueEl) return;
      const currentVal = valueEl.textContent;
      const label = labelEl.textContent.trim();
      valueEl.innerHTML = `<input class="syn-date-input"
        data-label="${label.replace(/"/g,'&quot;')}"
        value="${currentVal.replace(/"/g,'&quot;')}" />`;
    });

    // Insert edit mode banner
    const synCard = card.querySelector('.synopsis-card');
    if (synCard && !document.getElementById(`banner-${cardId}`)) {
      const banner = document.createElement('div');
      banner.className = 'edit-mode-banner';
      banner.id = `banner-${cardId}`;
      banner.innerHTML = `✏️ <strong>Edit Mode</strong> &nbsp;— Modify any field, then click Save.`;
      synCard.prepend(banner);
    }

    // Replace toolbar with Save / Cancel
    qr.innerHTML = `
      <button class="btn-save-edits" onclick="saveEdits('${cardId}')">💾 Save Changes</button>
      <button class="btn-cancel-edit" onclick="cancelEdit('${cardId}')">✕ Cancel</button>`;

    document.getElementById('chatStatus').textContent = '✏️ Editing...';
  }

  async function saveEdits(cardId) {
    const card = document.getElementById(cardId);
    if (!card) return;

    // Collect all changed inputs
    const batch = [];
    card.querySelectorAll('.syn-field-input, .syn-date-input').forEach(input => {
      batch.push({ label: input.dataset.label, value: input.value });
    });

    // Build JSON payload
    const payload = JSON.stringify({ "__batch_edit__": batch });

    // Send to agent
    const qr = document.getElementById(`qr-${cardId}`);
    qr.innerHTML = `<span style="font-size:12px;color:var(--sap-muted)">⚙️ Saving changes...</span>`;
    document.getElementById('chatStatus').textContent = '⚙️ Processing...';

    try {
      setLoading(true);
      const resp = await a2aPost(payload);
      handleResponse(resp);
    } catch(e) {
      addTextBubble('error', `Failed to save: ${e.message}`);
    } finally {
      setLoading(false);
    }
  }

  function cancelEdit(cardId) {
    const synopsis = _synopsisStore[cardId];
    if (!synopsis) return;
    // Re-render original card
    addSynopsisBubble(synopsis);
    // Remove edited card and toolbar
    const card = document.getElementById(cardId);
    const qr   = document.getElementById(`qr-${cardId}`);
    if (card) card.closest('.msg').remove();
    if (qr)   qr.remove();
    delete _synopsisStore[cardId];
    document.getElementById('chatStatus').textContent = '⏳ Awaiting review';
  }

  // ── Approval bubble with auto-download ───────────────────────────────────
  function addApprovalBubble(approval) {
    const msgs = document.getElementById('messages');
    const now  = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    const ref   = approval.__ref__ || '—';
    const portal = approval.__portal__ || '—';
    const dlUrl  = approval.__download_url__;
    const fname  = approval.__docx_filename__ || `TenderSynopsis_${approval.__sp_id__ || ''}.docx`;
    const spId   = approval.__sp_id__ || '';

    const el = document.createElement('div');
    el.className = 'msg agent';
    el.innerHTML = `
      <div class="avatar">AI</div>
      <div style="flex:1;min-width:0">
        <div class="bubble">
          <div class="state-badge completed">✅ Approved &amp; Saved</div>
          <div style="margin-top:8px;font-size:13px;">
            <div><strong>Reference:</strong> ${esc(ref)}</div>
            <div><strong>Portal:</strong> ${esc(portal)}</div>
            <div style="font-size:11px;color:var(--sap-muted);margin-top:2px;">
              📁 Saved to: output_docs/${esc(fname)}
            </div>
            ${dlUrl ? `<div style="margin-top:8px">
              <a href="${dlUrl}" download="${esc(fname)}"
                 style="display:inline-flex;align-items:center;gap:6px;
                        background:var(--sap-green);color:white;
                        padding:6px 14px;border-radius:4px;
                        text-decoration:none;font-size:12px;font-weight:600;">
                ⬇ Download TenderSynopsis_${spId}.docx
              </a>
            </div>` : ''}
          </div>
        </div>
        <div class="ts">${now}</div>
      </div>`;
    msgs.appendChild(el);

    // Auto-trigger download after 500ms
    if (dlUrl) {
      setTimeout(() => {
        const a = document.createElement('a');
        a.href = dlUrl;
        a.download = fname;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }, 600);
    }

    addSystemMsg(`✅ Synopsis approved. Reference: ${ref}`);
    msgs.scrollTop = msgs.scrollHeight;
    document.getElementById('chatStatus').textContent = '✅ Completed';
  }

  // ── Rich text bubble (fallback for non-structured text) ───────────────────
  function addRichTextBubble(text, showQuickReplies) {
    const msgs = document.getElementById('messages');
    const now  = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

    const badge = `<div class="state-badge input-required">⏳ Awaiting Review</div>`;
    const el = document.createElement('div');
    el.className = 'msg agent';
    el.innerHTML = `
      <div class="avatar">AI</div>
      <div style="flex:1;min-width:0">
        <div class="bubble">${badge}${formatText(text)}</div>
        <div class="ts">${now}</div>
      </div>`;
    msgs.appendChild(el);

    if (showQuickReplies) {
      const qr = document.createElement('div');
      qr.className = 'quick-replies';
      qr.innerHTML = `
        <button class="qr-btn approve" onclick="quickReply('approve')">✅ Approve</button>
        <button class="qr-btn reject"  onclick="quickReply('reject')">❌ Reject</button>
        <button class="qr-btn"         onclick="focusEdit()">✏️ Edit field</button>`;
      msgs.appendChild(qr);
    }
    msgs.scrollTop = msgs.scrollHeight;
  }

  // ── Completed bubble ──────────────────────────────────────────────────────
  function addCompletedBubble(text) {
    const msgs = document.getElementById('messages');
    const now  = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    const isSapError = text.includes('SAP EMT 601 is unreachable') ||
                       text.includes('Skill 2 failed') ||
                       text.includes('Skill 1 failed');
    const isError = text.toLowerCase().startsWith('error:') || isSapError;

    // Friendly message for SAP unavailability
    let displayText = text;
    if (isSapError) {
      displayText = `🔌 SAP EMT 601 is currently unreachable.\n\n` +
                    `Please check:\n` +
                    `• VPN is connected to SAP internal network\n` +
                    `• EMT 601 system is running (ping: ldciemt.wdf.sap.corp:44322/sap/public/ping)\n` +
                    `• Ask your SAP basis team to check transaction ST22 for ABAP dumps\n\n` +
                    `Technical: ${text.replace('Error: ','').substring(0, 300)}`;
    }

    const el = document.createElement('div');
    el.className = `msg agent${isError ? ' error' : ''}`;
    const badge = `<div class="state-badge ${isError ? 'working' : 'completed'}">${isError ? '❌ SAP Unavailable' : '✅ Completed'}</div>`;
    el.innerHTML = `
      <div class="avatar">AI</div>
      <div style="flex:1;min-width:0">
        <div class="bubble">${badge}${formatText(displayText)}</div>
        <div class="ts">${now}</div>
      </div>`;
    msgs.appendChild(el);
    addSystemMsg(isError ? '❌ Workflow ended with error.' : '✅ Synopsis approved and saved.');
    msgs.scrollTop = msgs.scrollHeight;
  }

  // ── Text bubble (generic) ─────────────────────────────────────────────────
  function addTextBubble(role, text, state) {
    const msgs = document.getElementById('messages');
    const now  = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    const isError = role === 'error';

    const el = document.createElement('div');
    el.className = `msg ${isError ? 'agent error' : role}`;

    if (role === 'user') {
      el.innerHTML = `
        <div class="avatar">You</div>
        <div><div class="bubble">${esc(text)}</div><div class="ts">${now}</div></div>`;
    } else {
      el.innerHTML = `
        <div class="avatar">AI</div>
        <div style="flex:1;min-width:0">
          <div class="bubble">${formatText(text)}</div>
          <div class="ts">${now}</div>
        </div>`;
    }
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
  }

  // addMessage now dispatches to correct function
  function addMessage(role, text, state, showQuickReplies) {
    if (role === 'user') {
      addTextBubble('user', text);
    } else if (role === 'error') {
      addTextBubble('error', text);
    } else if (state === 'input-required' && showQuickReplies) {
      addRichTextBubble(text, true);
    } else {
      addTextBubble('agent', text, state);
    }
  }

  function addSystemMsg(text) {
    const msgs = document.getElementById('messages');
    const el = document.createElement('div');
    el.className = 'msg system';
    el.innerHTML = `<div class="bubble">${esc(text)}</div>`;
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
  }

  async function quickReply(text) {
    document.getElementById('msgInput').value = text;
    await sendMessage();
  }

  function focusEdit() {
    const input = document.getElementById('msgInput');
    input.value = 'edit ';
    input.focus();
    input.setSelectionRange(5, 5);
  }

  function setLoading(on) {
    const btn  = document.getElementById('generateBtn');
    const send = document.getElementById('sendBtn');
    btn.disabled  = on;
    send.disabled = on;
    document.getElementById('chatStatus').textContent = on ? '⚙️ Processing...' : 'Ready';
    const msgs = document.getElementById('messages');
    const existingTyping = document.getElementById('typingIndicator');
    if (on && !existingTyping) {
      const el = document.createElement('div');
      el.id = 'typingIndicator';
      el.className = 'msg agent';
      el.innerHTML = `<div class="avatar">AI</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
      msgs.appendChild(el);
      msgs.scrollTop = msgs.scrollHeight;
    } else if (!on && existingTyping) {
      existingTyping.remove();
    }
  }

  function clearChat() {
    contextId = null;
    document.getElementById('ctxDisplay').textContent = '—';
    document.getElementById('messages').innerHTML =
      `<div class="msg system"><div class="bubble">Chat cleared. Enter a Sourcing Project ID to start.</div></div>`;
    document.getElementById('chatStatus').textContent = 'Ready';
  }

  function esc(s) {
    return String(s || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatText(s) {
    return esc(s)
      .replace(/\n/g,'<br>')
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  }

  function escHtml(s) { return formatText(s); }

  // Enter key on SP ID field
  document.getElementById('spId').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateSynopsis();
  });
</script>
</body>
